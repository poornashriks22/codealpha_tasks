<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poorna's FitFlow | Modern Fitness Tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="app-wrapper">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-bolt pulse"></i></div>
                    <h1>Poorna's<span>Fit Flow</span></h1>
                </div>
                <div class="header-right">
                    <p id="current-date"></p>
                    <button id="add-log-btn" class="btn-primary"><i class="fas fa-plus"></i> Add Activity</button>
                </div>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="card progress-card">
                <h3>Daily Goal</h3>
                <div class="progress-container">
                    <svg class="progress-ring" width="160" height="160">
                        <circle class="progress-ring__circle-bg" stroke="#e0e0e0" stroke-width="12" fill="transparent" r="70" cx="80" cy="80"/>
                        <circle id="goal-circle" class="progress-ring__circle" stroke="var(--primary)" stroke-width="12" stroke-linecap="round" fill="transparent" r="70" cx="80" cy="80"/>
                    </svg>
                    <div class="progress-text">
                        <span id="completion-pct">0%</span>
                        <p>Steps Goal</p>
                    </div>
                </div>
            </section>

            <div class="stats-group">
                <div class="card stat-widget">
                    <div class="widget-icon shoe-anim"><i class="fas fa-shoe-prints"></i></div>
                    <div class="widget-data">
                        <h4 id="stat-steps">0</h4>
                        <p>Steps Taken</p>
                    </div>
                </div>
                <div class="card stat-widget">
                    <div class="widget-icon fire-anim"><i class="fas fa-fire"></i></div>
                    <div class="widget-data">
                        <h4 id="stat-calories">0</h4>
                        <p>Calories Burned</p>
                    </div>
                </div>
                <div class="card stat-widget">
                    <div class="widget-icon heart-anim"><i class="fas fa-heartbeat"></i></div>
                    <div class="widget-data">
                        <h4 id="stat-duration">0</h4>
                        <p>Active Minutes</p>
                    </div>
                </div>
            </div>

            <section class="card chart-card">
                <h3>Weekly Activity Overview</h3>
                <div class="chart-container">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </section>

            <section class="card log-card">
                <h3>Recent Activities</h3>
                <div class="log-list" id="log-list">
                    </div>
            </section>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2>Log New Activity</h2>
            <form id="activity-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Exercise Type</label>
                        <select id="exercise-type" required>
                            <option value="Running">🏃 Running</option>
                            <option value="Cycling">🚴 Cycling</option>
                            <option value="Weightlifting">🏋️ Weights</option>
                            <option value="Yoga">🧘 Yoga</option>
                            <option value="Walking">🚶 Walking</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Duration (Min)</label>
                        <input type="number" id="duration" placeholder="30" required min="1">
                    </div>
                    <div class="input-group">
                        <label>Calories</label>
                        <input type="number" id="calories" placeholder="250" required min="1">
                    </div>
                    <div class="input-group">
                        <label>Steps</label>
                        <input type="number" id="steps" placeholder="5000" value="0" min="0">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save Activity</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">Action completed!</div>

    <script src="script.js"></script>
</body>
</html>
